services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: masterqala
      POSTGRES_PASSWORD: masterqala
      POSTGRES_DB: masterqala
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
  db_test:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: masterqala
      POSTGRES_PASSWORD: masterqala
      POSTGRES_DB: masterqala_test
    ports:
      - "5433:5432"
volumes:
  dbdata:
